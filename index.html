<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EUL Protocol Intelligence Dashboard</title>
<style>
  html, body, #root { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
  body { background: #0f172a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  #loading { display: flex; align-items: center; justify-content: center; height: 100vh; color: #94a3b8; font-size: 14px; flex-direction: column; gap: 12px; }
  #loading .spinner { width: 32px; height: 32px; border: 3px solid #334155; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root">
  <div id="loading">
    <div class="spinner"></div>
    <div>Loading EUL Dashboard...</div>
  </div>
</div>
<script src="bundle.js"></script>
</body>
</html>
